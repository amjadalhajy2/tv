<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل IPTV السحابي</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }
        
        /* تصميم قسم تسجيل الدخول ليتناسب مع Xtream */
        .login-panel { background-color: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 12px; }
        .row { display: flex; gap: 10px; width: 100%; }
        input[type="text"], input[type="password"] { flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #333; background-color: #252525; color: white; }
        button { padding: 12px; border-radius: 4px; border: none; background-color: #444; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #555; }
        
        video { width: 100%; background-color: #000; border-radius: 8px; margin-bottom: 20px; }
        .video-list { max-height: 400px; overflow-y: auto; background-color: #1e1e1e; border-radius: 8px; padding: 10px; list-style: none; margin: 0; }
        .video-item { padding: 12px; border-bottom: 1px solid #2d2d2d; cursor: pointer; }
        .video-item:hover { background-color: #2a2a2a; }
        .active-item { background-color: #444 !important; font-weight: bold; border-right: 4px solid #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="login-panel">
        <input type="text" id="xtHost" placeholder="رابط الخادم (مثال: http://domain:port)">
        <div class="row">
            <input type="text" id="xtUser" placeholder="اسم المستخدم (Username)">
            <input type="password" id="xtPass" placeholder="كلمة المرور (Password)">
        </div>
        <button onclick="loginXtream()">تسجيل الدخول وجلب القائمة</button>
        <input type="text" id="searchInput" placeholder="ابحث عن فيلم أو قناة..." onkeyup="filterList()" style="display: none; margin-top: 10px;">
    </div>

    <video id="videoPlayer" controls></video>

    <ul id="videoList" class="video-list">
        <li style="padding: 10px; color: #888;">أدخل بيانات Xtream الخاصة بك للبدء...</li>
    </ul>
</div>

<script>
    const SUPABASE_URL = 'ضع_رابط_سوبابيس';
    const SUPABASE_KEY = 'ضع_مفتاح_سوبابيس';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const video = document.getElementById('videoPlayer');
    let hls = new Hls();
    let currentVideoId = ''; 
    let saveInterval = null;

    async function loginXtream() {
        let host = document.getElementById('xtHost').value.trim();
        const user = document.getElementById('xtUser').value.trim();
        const pass = document.getElementById('xtPass').value.trim();

        if (!host || !user || !pass) return alert('الرجاء إدخال جميع البيانات');

        // تنظيف الرابط (إزالة الشرطة المائلة من النهاية إذا قام المستخدم بكتابتها)
        if (host.endsWith('/')) host = host.slice(0, -1);

        // تحويل بيانات Xtream إلى رابط M3U متوافق
        const m3uUrl = `${host}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=m3u8`;

        const listContainer = document.getElementById('videoList');
        listContainer.innerHTML = '<li style="padding: 10px; color: #888;">جاري الاتصال بالخادم وجلب القائمة...</li>';

        try {
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(m3uUrl)}`;
            const response = await fetch(proxyUrl);
            const data = await response.text();
            
            // التحقق مما إذا كانت بيانات الدخول خاطئة
            if (data.includes("Invalid") || data.includes("Failed") || data.trim() === "") {
                listContainer.innerHTML = '<li style="color: #ff5555;">خطأ: بيانات الدخول غير صحيحة أو الخادم متوقف.</li>';
                return;
            }

            const playlist = parseM3U(data);
            listContainer.innerHTML = '';
            
            if (playlist.length === 0) {
                listContainer.innerHTML = '<li>لم يتم العثور على محتوى.</li>';
                return;
            }

            document.getElementById('searchInput').style.display = 'block';

            playlist.forEach((item) => {
                const li = document.createElement('li');
                li.className = 'video-item';
                li.innerText = item.title;
                li.onclick = () => playVideo(item.url, item.title, li);
                listContainer.appendChild(li);
            });

        } catch (error) {
            console.error(error);
            listContainer.innerHTML = '<li style="color: #ff5555;">فشل الاتصال بالخادم. تأكد من صحة الرابط.</li>';
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        const playlist = [];
        let currentItem = null;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith('#EXTINF:')) {
                const titleMatch = line.match(/,(.+)$/);
                currentItem = { title: titleMatch ? titleMatch[1] : 'بدون عنوان' };
            } else if (line.startsWith('http') && currentItem) {
                currentItem.url = line;
                playlist.push(currentItem);
                currentItem = null;
            }
        }
        return playlist;
    }

    function filterList() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const items = document.querySelectorAll('.video-item');
        items.forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(query) ? 'block' : 'none';
        });
    }

    async function playVideo(url, title, element) {
        document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active-item'));
        element.classList.add('active-item');

        currentVideoId = btoa(unescape(encodeURIComponent(title))).substring(0, 30); 
        if (saveInterval) clearInterval(saveInterval);

        if (Hls.isSupported()) {
            hls.destroy(); 
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, async function() {
                const { data } = await supabase.from('user_progress').select('current_time').eq('video_id', currentVideoId).single();
                if (data && data.current_time) video.currentTime = data.current_time;
                video.play();
                startTracking();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.addEventListener('loadedmetadata', async function() {
                const { data } = await supabase.from('user_progress').select('current_time').eq('video_id', currentVideoId).single();
                if (data && data.current_time) video.currentTime = data.current_time;
                video.play();
                startTracking();
            });
        }
    }

    function startTracking() {
        saveInterval = setInterval(async () => {
            if (!video.paused && currentVideoId) {
                await supabase.from('user_progress').upsert({ video_id: currentVideoId, current_time: video.currentTime }, { onConflict: 'video_id' });
            }
        }, 10000);
    }
</script>

</body>
</html>
