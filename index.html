<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق IPTV الذكي - المنصة الشاملة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background-color: #111; 
            color: white; 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            text-align: center; 
        }
        input, select { 
            padding: 10px; 
            margin: 5px; 
            width: 80%; 
            max-width: 300px; 
            border-radius: 5px; 
            border: none; 
            font-family: Arial, sans-serif;
            background: #222;
            color: white;
            border: 1px solid #444;
        }
        button { 
            background: #e50914; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            margin-top: 10px; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
        }
        button:hover { background: #b20710; }
        .hidden { display: none; }
        
        .movie-card { 
            background: #222; 
            margin: 10px; 
            padding: 15px; 
            border-radius: 8px; 
            display: inline-block; 
            width: 200px; 
            vertical-align: top;
        }
        .movie-card img { 
            width: 100%; 
            border-radius: 5px; 
            height: 250px; 
            object-fit: cover; 
        }
        .progress-bar { 
            height: 5px; 
            background: #555; 
            margin-top: 10px; 
            border-radius: 5px; 
            overflow: hidden; 
        }
        .progress-fill { 
            height: 100%; 
            background: #e50914; 
            width: 0%; 
        }
        
        .header-bar {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            max-width: 900px; 
            margin: 0 auto 20px auto;
        }
        .tabs-container {
            margin-bottom: 20px;
        }
        .tab-btn {
            background: #333;
            margin: 0 5px;
            font-size: 16px;
        }
        .tab-btn.active {
            background: #e50914;
        }
        .filters-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box {
            width: 100%;
            max-width: 400px;
        }
        .loading-text {
            color: #f39c12;
            font-size: 18px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>تسجيل الدخول للاشتراك</h2>
        <input type="text" id="xtream-domain" placeholder="رابط السيرفر (مثال: http://domain.com:8080)"><br>
        <input type="text" id="xtream-user" placeholder="اسم المستخدم"><br>
        <input type="password" id="xtream-pass" placeholder="كلمة المرور"><br>
        <button onclick="saveCredentialsAndLogin()">دخول وحفظ البيانات</button>
    </div>

    <div id="main-screen" class="hidden">
        <div class="header-bar">
            <h2>مكتبة البث</h2>
            <button onclick="logout()" style="background: #555;">تسجيل خروج</button>
        </div>
        
        <div class="tabs-container">
            <button id="btn-vod" class="tab-btn active" onclick="switchMode('vod')">🎬 أفلام</button>
            <button id="btn-series" class="tab-btn" onclick="switchMode('series')">📺 مسلسلات</button>
            <button id="btn-live" class="tab-btn" onclick="switchMode('live')">📡 قنوات مباشرة</button>
        </div>

        <div class="filters-bar">
            <select id="category-selector" onchange="fetchContent(this.value)">
                <option value="">جاري التحميل...</option>
            </select>
            <input type="text" id="search-input" class="search-box" placeholder="ابحث عن فيلم، مسلسل، أو قناة..." onkeyup="filterResults()">
        </div>

        <div id="movies-container">
            <div class="loading-text">جاري تحميل المكتبة...</div>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://kpfymvtyqbyjmlqfgujo.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_g7dHfpmPHcQwAWsO9FFuGw_4lG8fyLc'; 
    
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = '';
    let currentDomain = '';
    let currentPass = '';
    let currentMovieId = null; 

    let currentMode = 'vod'; 
    let allCurrentData = []; 

    window.onload = function() {
        const savedUser = localStorage.getItem('xtream_user');
        const savedPass = localStorage.getItem('xtream_pass');
        const savedDomain = localStorage.getItem('xtream_domain');

        if (savedUser && savedPass && savedDomain) {
            currentUser = savedUser;
            currentPass = savedPass;
            currentDomain = savedDomain;
            showMainScreen();
        }
    };

    function saveCredentialsAndLogin() {
        const domain = document.getElementById('xtream-domain').value.trim();
        const user = document.getElementById('xtream-user').value.trim();
        const pass = document.getElementById('xtream-pass').value.trim();

        if (!domain || !user || !pass) {
            alert("يرجى تعبئة جميع الحقول!");
            return;
        }

        const cleanDomain = domain.endsWith('/') ? domain.slice(0, -1) : domain;

        localStorage.setItem('xtream_domain', cleanDomain);
        localStorage.setItem('xtream_user', user);
        localStorage.setItem('xtream_pass', pass);

        currentUser = user;
        currentPass = pass;
        currentDomain = cleanDomain;
        showMainScreen();
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    function showMainScreen() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        switchMode('vod'); 
    }

    function switchMode(mode) {
        currentMode = mode;
        
        document.getElementById('btn-vod').classList.remove('active');
        document.getElementById('btn-series').classList.remove('active');
        document.getElementById('btn-live').classList.remove('active');
        document.getElementById(`btn-${mode}`).classList.add('active');

        document.getElementById('search-input').value = '';

        fetchCategories();
    }

    async function fetchCategories() {
        let action = '';
        if (currentMode === 'vod') action = 'get_vod_categories';
        else if (currentMode === 'series') action = 'get_series_categories';
        else if (currentMode === 'live') action = 'get_live_categories';

        const apiUrl = `${currentDomain}/player_api.php?username=${currentUser}&password=${currentPass}&action=${action}`;
        
        try {
            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error("فشل الاتصال");
            
            const categories = await response.json();
            const selector = document.getElementById('category-selector');
            selector.innerHTML = ''; 

            if (categories.length === 0) {
                selector.innerHTML = '<option value="">لا توجد باقات متاحة</option>';
                document.getElementById('movies-container').innerHTML = '';
                return;
            }

            // إضافة قسم "الكل" في بداية القائمة
            const optionAll = document.createElement('option');
            optionAll.value = 'all';
            optionAll.text = '🌐 الكل (بحث شامل)';
            selector.appendChild(optionAll);

            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.category_id;
                option.text = cat.category_name;
                selector.appendChild(option);
            });

            // تحميل قسم "الكل" ليكون متاحاً للبحث الفوري مباشرة
            fetchContent('all');

        } catch (error) {
            document.getElementById('category-selector').innerHTML = '<option value="">حدث خطأ في تحميل التصنيفات</option>';
        }
    }

    async function fetchContent(categoryId) {
        if (!categoryId) return;
        
        document.getElementById('movies-container').innerHTML = `
            <div class="loading-text">
                ⏳ جاري التحميل... <br><br> 
                <small style="color: #888;">(سحب المكتبة بالكامل قد يستغرق بضع ثوانٍ)</small>
            </div>`;
        
        let action = '';
        if (currentMode === 'vod') action = 'get_vod_streams';
        else if (currentMode === 'series') action = 'get_series';
        else if (currentMode === 'live') action = 'get_live_streams';

        // إذا تم اختيار "الكل"، نقوم بإزالة parameter الـ category_id لجلب المكتبة كاملة
        let apiUrl = `${currentDomain}/player_api.php?username=${currentUser}&password=${currentPass}&action=${action}`;
        if (categoryId !== 'all') {
            apiUrl += `&category_id=${categoryId}`;
        }
        
        try {
            const xtreamResponse = await fetch(apiUrl);
            allCurrentData = await xtreamResponse.json(); 

            // محاولة جلب بيانات سوبابيس (نتجاهل الخطأ إن لم تكن مربوطة)
            let userActivity = [];
            try {
                const { data } = await supabaseClient
                    .from('user_activity')
                    .select('*')
                    .eq('username', currentUser);
                if (data) userActivity = data;
            } catch(e) {}

            renderDisplay(allCurrentData.slice(0, 100), userActivity); 
        } catch (error) {
            document.getElementById('movies-container').innerHTML = '<div class="loading-text" style="color: red;">حدث خطأ أثناء جلب البيانات.</div>';
        }
    }

    function filterResults() {
        const query = document.getElementById('search-input').value.toLowerCase();
        
        const filteredData = allCurrentData.filter(item => {
            const title = item.name ? item.name.toLowerCase() : "";
            return title.includes(query);
        });

        renderDisplay(filteredData.slice(0, 100), []); 
    }

    function renderDisplay(items, userActivity) {
        const container = document.getElementById('movies-container');
        container.innerHTML = '';

        if (!items || items.length === 0) {
            container.innerHTML = '<div class="loading-text">لا يوجد محتوى في هذا التصنيف أو مطابق لبحثك.</div>';
            return;
        }

        items.forEach(item => {
            const id = item.stream_id || item.series_id;
            const name = item.name;
            const icon = item.stream_icon || item.cover || 'https://via.placeholder.com/200x250?text=بدون+صورة';
            
            const activity = userActivity.find(act => act.movie_id == id);
            const resumeTime = activity ? activity.resume_time : 0;
            const progressPercent = resumeTime > 0 ? Math.min((resumeTime / 7200) * 100, 100) : 0;

            const cardEl = document.createElement('div');
            cardEl.className = 'movie-card';
            
            let actionHtml = '';

            if (currentMode === 'live') {
                const videoUrl = `${currentDomain}/${currentUser}/${currentPass}/${id}`;
                actionHtml = `<button onclick="playMovieInApp('${videoUrl}', 0, '${id}')">📺 تشغيل القناة</button>`;
            } else if (currentMode === 'vod') {
                const ext = item.container_extension || "mkv";
                const videoUrl = `${currentDomain}/movie/${currentUser}/${currentPass}/${id}.${ext}`;
                actionHtml = `
                    ${resumeTime > 0 ? `<div class="progress-bar"><div class="progress-fill" style="width: ${progressPercent}%"></div></div><small style="color:#aaa;">تمت المشاهدة جزئياً</small>` : ''}
                    <button onclick="playMovieInApp('${videoUrl}', ${resumeTime}, '${id}')">${resumeTime > 0 ? 'إكمال المشاهدة' : '▶ تشغيل الفيلم'}</button>
                `;
            } else if (currentMode === 'series') {
                actionHtml = `<button onclick="playSeriesFirstEpisode('${id}')" style="background:#f39c12;">▶ تشغيل الحلقة 1</button>`;
            }

            cardEl.innerHTML = `
                <img src="${icon}" onerror="this.src='https://via.placeholder.com/200x250?text=بدون+صورة'">
                <h3 style="font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${name}">${name}</h3>
                ${actionHtml}
            `;
            container.appendChild(cardEl);
        });
    }

    async function playSeriesFirstEpisode(seriesId) {
        const apiUrl = `${currentDomain}/player_api.php?username=${currentUser}&password=${currentPass}&action=get_series_info&series_id=${seriesId}`;
        
        try {
            const response = await fetch(apiUrl);
            const data = await response.json();
            
            const seasons = Object.keys(data.episodes);
            if (seasons.length > 0) {
                const firstEpisode = data.episodes[seasons[0]][0];
                const ext = firstEpisode.container_extension || 'mkv';
                const videoUrl = `${currentDomain}/series/${currentUser}/${currentPass}/${firstEpisode.id}.${ext}`;
                
                playMovieInApp(videoUrl, 0, firstEpisode.id);
            } else {
                alert("عفواً، لا توجد حلقات متاحة لهذا المسلسل حالياً.");
            }
        } catch (error) {
            alert("حدث خطأ أثناء محاولة جلب المسلسل.");
        }
    }

    function playMovieInApp(videoUrl, resumeTime, movieId) {
        currentMovieId = movieId;
        const message = { type: 'PLAY_MOVIE', url: videoUrl, resumeTime: resumeTime };

        if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(JSON.stringify(message));
        } else {
            alert("محاكاة التشغيل للتطبيق:\n" + videoUrl + "\nوقت البدء: " + resumeTime);
        }
    }

    window.updateWatchProgress = async function(currentSeconds) {
        if (!currentMovieId || !currentUser || currentMode === 'live') return; 
        
        await supabaseClient
            .from('user_activity')
            .upsert({ 
                username: currentUser, 
                movie_id: currentMovieId, 
                resume_time: currentSeconds 
            }, { onConflict: 'username, movie_id' });
    };
</script>
</body>
</html>
