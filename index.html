<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق IPTV الذكي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background-color: #111; 
            color: white; 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            text-align: center; 
        }
        input, select { 
            padding: 10px; 
            margin: 5px; 
            width: 80%; 
            max-width: 300px; 
            border-radius: 5px; 
            border: none; 
            font-family: Arial, sans-serif;
        }
        button { 
            background: #e50914; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            margin-top: 10px; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .hidden { 
            display: none; 
        }
        .movie-card { 
            background: #222; 
            margin: 10px; 
            padding: 15px; 
            border-radius: 8px; 
            display: inline-block; 
            width: 200px; 
            vertical-align: top;
        }
        .movie-card img { 
            width: 100%; 
            border-radius: 5px; 
            height: 250px; 
            object-fit: cover; 
        }
        .progress-bar { 
            height: 5px; 
            background: #555; 
            margin-top: 10px; 
            border-radius: 5px; 
            overflow: hidden; 
        }
        .progress-fill { 
            height: 100%; 
            background: #e50914; 
            width: 0%; 
        }
        .header-bar {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            max-width: 800px; 
            margin: 0 auto 20px auto;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>تسجيل الدخول للاشتراك</h2>
        <input type="text" id="xtream-domain" placeholder="رابط السيرفر (مثال: http://domain.com:8080)"><br>
        <input type="text" id="xtream-user" placeholder="اسم المستخدم"><br>
        <input type="password" id="xtream-pass" placeholder="كلمة المرور"><br>
        <button onclick="saveCredentialsAndLogin()">دخول وحفظ البيانات</button>
    </div>

    <div id="main-screen" class="hidden">
        <div class="header-bar">
            <h2>مكتبة الأفلام</h2>
            <button onclick="logout()" style="background: #555;">تسجيل خروج</button>
        </div>
        
        <div style="margin-bottom: 20px;">
            <select id="category-selector" onchange="fetchMovies(this.value)">
                <option value="">جاري تحميل التصنيفات...</option>
            </select>
        </div>

        <div id="movies-container">جاري تحميل المكتبة...</div>
    </div>

<script>
    // ==========================================
    // 1. إعدادات Supabase (ضع مفاتيحك هنا)
    // ==========================================
    const SUPABASE_URL = 'https://kpfymvtyqbyjmlqfgujo.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_g7dHfpmPHcQwAWsO9FFuGw_4lG8fyLc'; 
    
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = '';
    let currentDomain = '';
    let currentPass = '';
    let currentMovieId = null; 

    // ==========================================
    // 2. نظام تسجيل الدخول
    // ==========================================
    window.onload = function() {
        const savedUser = localStorage.getItem('xtream_user');
        const savedPass = localStorage.getItem('xtream_pass');
        const savedDomain = localStorage.getItem('xtream_domain');

        if (savedUser && savedPass && savedDomain) {
            currentUser = savedUser;
            currentPass = savedPass;
            currentDomain = savedDomain;
            showMainScreen();
        }
    };

    function saveCredentialsAndLogin() {
        const domain = document.getElementById('xtream-domain').value.trim();
        const user = document.getElementById('xtream-user').value.trim();
        const pass = document.getElementById('xtream-pass').value.trim();

        if (!domain || !user || !pass) {
            alert("يرجى تعبئة جميع الحقول!");
            return;
        }

        const cleanDomain = domain.endsWith('/') ? domain.slice(0, -1) : domain;

        localStorage.setItem('xtream_domain', cleanDomain);
        localStorage.setItem('xtream_user', user);
        localStorage.setItem('xtream_pass', pass);

        currentUser = user;
        currentPass = pass;
        currentDomain = cleanDomain;
        showMainScreen();
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    function showMainScreen() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        // بدلاً من جلب رقم 15، نقوم بجلب قائمة التصنيفات أولاً
        fetchCategories(); 
    }

    // ==========================================
    // 3. جلب التصنيفات (الجديد)
    // ==========================================
    async function fetchCategories() {
        const apiUrl = `${currentDomain}/player_api.php?username=${currentUser}&password=${currentPass}&action=get_vod_categories`;
        
        try {
            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error("فشل الاتصال بسيرفر التصنيفات");
            
            const categories = await response.json();
            const selector = document.getElementById('category-selector');
            selector.innerHTML = ''; // تفريغ القائمة

            if (categories.length === 0) {
                selector.innerHTML = '<option value="">لا توجد تصنيفات في اشتراكك</option>';
                return;
            }

            // إضافة التصنيفات للقائمة المنسدلة
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.category_id;
                option.text = cat.category_name;
                selector.appendChild(option);
            });

            // جلب أفلام أول تصنيف تلقائياً
            fetchMovies(categories[0].category_id);

        } catch (error) {
            console.error("خطأ في جلب التصنيفات:", error);
            document.getElementById('category-selector').innerHTML = '<option value="">حدث خطأ في تحميل التصنيفات</option>';
        }
    }

    // ==========================================
    // 4. جلب الأفلام بناءً على التصنيف المختار
    // ==========================================
    async function fetchMovies(categoryId) {
        if (!categoryId) return;
        document.getElementById('movies-container').innerText = "جاري تحميل الأفلام...";
        
        const apiUrl = `${currentDomain}/player_api.php?username=${currentUser}&password=${currentPass}&action=get_vod_streams&category_id=${categoryId}`;
        
        try {
            const xtreamResponse = await fetch(apiUrl);
            const movies = await xtreamResponse.json();

            const { data: userActivity, error } = await supabaseClient
                .from('user_activity')
                .select('*')
                .eq('username', currentUser);

            displayMovies(movies.slice(0, 50), userActivity || []); // رفعنا العدد لـ 50 فيلم
        } catch (error) {
            document.getElementById('movies-container').innerText = "حدث خطأ أثناء الاتصال بالخادم.";
        }
    }

    function displayMovies(movies, userActivity) {
        const container = document.getElementById('movies-container');
        container.innerHTML = '';

        if (!movies || movies.length === 0) {
            container.innerText = "لا توجد أفلام في هذا التصنيف.";
            return;
        }

        movies.forEach(movie => {
            const activity = userActivity.find(act => act.movie_id == movie.stream_id);
            const resumeTime = activity ? activity.resume_time : 0;
            const isFav = activity ? activity.is_favorite : false;

            const streamExtension = movie.container_extension || "mkv";
            const videoUrl = `${currentDomain}/movie/${currentUser}/${currentPass}/${movie.stream_id}.${streamExtension}`;
            const progressPercent = resumeTime > 0 ? Math.min((resumeTime / 7200) * 100, 100) : 0;

            const movieEl = document.createElement('div');
            movieEl.className = 'movie-card';
            movieEl.innerHTML = `
                <img src="${movie.stream_icon}" onerror="this.src='https://via.placeholder.com/200x250?text=بدون+صورة'">
                <h3 style="font-size: 14px;">${movie.name}</h3>
                
                ${resumeTime > 0 ? `<div class="progress-bar"><div class="progress-fill" style="width: ${progressPercent}%"></div></div><small style="color:#aaa;">تمت المشاهدة جزئياً</small>` : ''}
                
                <button onclick="playMovieInApp('${videoUrl}', ${resumeTime}, '${movie.stream_id}')">
                    ${resumeTime > 0 ? 'إكمال المشاهدة' : 'تشغيل الفيلم'}
                </button>
                <button onclick="toggleFavorite('${movie.stream_id}', ${!isFav})" style="background: ${isFav ? '#f39c12' : '#333'};">
                    ${isFav ? '★ مفضل' : '☆ أضف للمفضلة'}
                </button>
            `;
            container.appendChild(movieEl);
        });
    }

    // ==========================================
    // 5. الجسر للتواصل مع الآيفون والمزامنة
    // ==========================================
    function playMovieInApp(videoUrl, resumeTime, movieId) {
        currentMovieId = movieId;
        const message = { type: 'PLAY_MOVIE', url: videoUrl, resumeTime: resumeTime };

        if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(JSON.stringify(message));
        } else {
            alert("محاكاة التشغيل:\nالرابط: " + videoUrl + "\nالبدء من الثانية: " + resumeTime);
        }
    }

    window.updateWatchProgress = async function(currentSeconds) {
        if (!currentMovieId || !currentUser) return;
        await supabaseClient
            .from('user_activity')
            .upsert({ 
                username: currentUser, 
                movie_id: currentMovieId, 
                resume_time: currentSeconds 
            }, { onConflict: 'username, movie_id' });
    };

    async function toggleFavorite(movieId, makeFavorite) {
        await supabaseClient
            .from('user_activity')
            .upsert({ 
                username: currentUser, 
                movie_id: movieId, 
                is_favorite: makeFavorite 
            }, { onConflict: 'username, movie_id' });

        const selectedCategory = document.getElementById('category-selector').value;
        fetchMovies(selectedCategory); 
    }
</script>
</body>
</html>
