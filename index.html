<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل IPTV (نسخة اختبار المزود)</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* تصميم بسيط ومريح للعين بدون ألوان كثيرة */
        body { font-family: Tahoma, sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }
        
        .login-panel { background-color: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 12px; }
        .row { display: flex; gap: 10px; width: 100%; }
        input[type="text"], input[type="password"] { flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #333; background-color: #252525; color: white; }
        button { padding: 12px; border-radius: 4px; border: none; background-color: #444; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #555; }
        
        #errorBox { display: none; background-color: #441111; color: #ff5555; padding: 15px; border-radius: 4px; border: 1px solid #ff5555; margin-bottom: 20px; font-weight: bold; }

        video { width: 100%; background-color: #000; border-radius: 8px; margin-bottom: 20px; }
        .video-list { max-height: 400px; overflow-y: auto; background-color: #1e1e1e; border-radius: 8px; padding: 10px; list-style: none; margin: 0; }
        .video-item { padding: 12px; border-bottom: 1px solid #2d2d2d; cursor: pointer; }
        .video-item:hover { background-color: #2a2a2a; }
        .active-item { background-color: #444 !important; font-weight: bold; border-right: 4px solid #fff; }
    </style>
</head>
<body>

<div class="container">
    <div id="errorBox"></div>

    <div class="login-panel">
        <input type="text" id="xtHost" placeholder="رابط الخادم (مثال: http://domain:port)">
        <div class="row">
            <input type="text" id="xtUser" placeholder="اسم المستخدم (Username)">
            <input type="password" id="xtPass" placeholder="كلمة المرور (Password)">
        </div>
        <button onclick="loginXtream()">جلب القائمة والتشغيل</button>
        <input type="text" id="searchInput" placeholder="ابحث عن فيلم أو قناة..." onkeyup="filterList()" style="display: none; margin-top: 10px;">
    </div>

    <video id="videoPlayer" controls></video>

    <ul id="videoList" class="video-list">
        <li style="padding: 10px; color: #888;">الرجاء إدخال بيانات الاشتراك للاتصال بالمزود...</li>
    </ul>
</div>

<script>
    const video = document.getElementById('videoPlayer');
    const errorBox = document.getElementById('errorBox');
    let hls = new Hls();

    function showError(message) {
        errorBox.style.display = 'block';
        errorBox.innerText = message;
    }

    function hideError() {
        errorBox.style.display = 'none';
        errorBox.innerText = '';
    }

async function loginXtream() {
        hideError();
        let host = document.getElementById('xtHost').value.trim();
        const user = document.getElementById('xtUser').value.trim();
        const pass = document.getElementById('xtPass').value.trim();

        if (!host || !user || !pass) {
            showError('الرجاء إدخال جميع البيانات للاتصال.');
            return;
        }

        if (host.endsWith('/')) host = host.slice(0, -1);
        const m3uUrl = `${host}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=m3u8`;
        const listContainer = document.getElementById('videoList');
        
        listContainer.innerHTML = '<li style="padding: 10px; color: #888;">جاري محاولة تخطي حظر المزود وجلب القائمة...</li>';

        // قائمة بـ 3 خوادم بروكسي مختلفة لتجربتها بالترتيب
        const proxies = [
            `https://corsproxy.io/?${encodeURIComponent(m3uUrl)}`,
            `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(m3uUrl)}`,
            `https://api.allorigins.win/raw?url=${encodeURIComponent(m3uUrl)}`
        ];

        let fetchedData = null;
        let connectionSuccess = false;

        // محاولة الاتصال بالبروكسيات واحداً تلو الآخر
        for (let i = 0; i < proxies.length; i++) {
            try {
                const response = await fetch(proxies[i]);
                if (response.ok) {
                    const text = await response.text();
                    // التحقق من أن الاستجابة ليست رسالة خطأ من المزود
                    if (!text.includes("Invalid") && !text.includes("Failed") && text.trim() !== "") {
                        fetchedData = text;
                        connectionSuccess = true;
                        break; // نجح الاتصال، أوقف المحاولات
                    }
                }
            } catch (error) {
                console.log(`فشل البروكسي رقم ${i + 1}، جاري تجربة التالي...`);
            }
        }

if (!connectionSuccess || !fetchedData) {
            listContainer.innerHTML = '<li></li>';
            showError('حماية المزود عالية جداً: تم حظر جميع محاولات البروكسي العامة.');
            return;
        }

        // --- كود الاستكشاف الجديد ---
        // ملفات IPTV يجب أن تبدأ دائماً بكلمة #EXTM3U
        if (!fetchedData.trim().startsWith("#EXTM3U")) {
            listContainer.innerHTML = '<li></li>';
            showError(`تم الاتصال، ولكن الخادم رد بهذه الرسالة بدلاً من القنوات: "${fetchedData.substring(0, 150)}"`);
            return;
        }
        // ------------------------

        try {
            const playlist = parseM3U(fetchedData);
            listContainer.innerHTML = '';
            
            if (playlist.length === 0) {
                listContainer.innerHTML = '<li></li>';
                showError('تم الاتصال ولكن قائمة القنوات فارغة.');
                return;
            }

            document.getElementById('searchInput').style.display = 'block';

            playlist.forEach((item) => {
                const li = document.createElement('li');
                li.className = 'video-item';
                li.innerText = item.title;
                li.onclick = () => playVideo(item.url, li);
                listContainer.appendChild(li);
            });

        } catch (error) {
            listContainer.innerHTML = '<li></li>';
            showError(`خطأ في قراءة البيانات: ${error.message}`);
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        const playlist = [];
        let currentItem = null;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith('#EXTINF:')) {
                const titleMatch = line.match(/,(.+)$/);
                currentItem = { title: titleMatch ? titleMatch[1] : 'بدون عنوان' };
            } else if (line.startsWith('http') && currentItem) {
                currentItem.url = line;
                playlist.push(currentItem);
                currentItem = null;
            }
        }
        return playlist;
    }

    function filterList() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const items = document.querySelectorAll('.video-item');
        items.forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(query) ? 'block' : 'none';
        });
    }

    function playVideo(url, element) {
        hideError();
        document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active-item'));
        element.classList.add('active-item');

        if (Hls.isSupported()) {
            hls.destroy(); 
            hls = new Hls();
            
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    showError('خطأ من المزود أثناء التشغيل: الرابط معطل أو لا يسمح بالتشغيل عبر المتصفح.');
                }
            });

            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.addEventListener('error', function() {
                showError('متصفحك لا يدعم تشغيل هذه الصيغة مباشرة.');
            });
            video.play();
        }
    }
</script>

</body>
</html>
