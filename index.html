<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق IPTV الذكي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #111; color: white; font-family: Arial, sans-serif; padding: 20px; text-align: center; }
        input { padding: 10px; margin: 5px; width: 80%; max-width: 300px; border-radius: 5px; border: none; }
        button { background: #e50914; color: white; border: none; padding: 10px 20px; margin-top: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        .movie-card { background: #222; margin: 10px; padding: 15px; border-radius: 8px; display: inline-block; width: 200px; }
        .movie-card img { width: 100%; border-radius: 5px; height: 250px; object-fit: cover; }
        .progress-bar { height: 5px; background: #555; margin-top: 10px; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: #e50914; width: 0%; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>تسجيل الدخول للاشتراك</h2>
        <input type="text" id="xtream-domain" placeholder="رابط السيرفر (مثال: http://domain.com:8080)"><br>
        <input type="text" id="xtream-user" placeholder="اسم المستخدم"><br>
        <input type="password" id="xtream-pass" placeholder="كلمة المرور"><br>
        <button onclick="saveCredentialsAndLogin()">دخول وحفظ البيانات</button>
    </div>

    <div id="main-screen" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>مكتبة الأفلام</h2>
            <button onclick="logout()" style="background: #555;">تسجيل خروج</button>
        </div>
        <div id="movies-container">جاري تحميل المكتبة...</div>
    </div>

<script>
    // ==========================================
    // 1. إعدادات Supabase (ضع مفاتيحك هنا)
    // ==========================================
    const SUPABASE_URL = 'https://kpfymvtyqbyjmlqfgujo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_g7dHfpmPHcQwAWsO9FFuGw_4lG8fyLc'; // ضع مفتاحك هنا
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // متغيرات الجلسة
    let currentUser = '';
    let currentDomain = '';
    let currentPass = '';
    let currentMovieId = null; // الفيلم المشغل حالياً

    // ==========================================
    // 2. نظام تسجيل الدخول والحفظ المحلي
    // ==========================================
    window.onload = function() {
        // التحقق مما إذا كانت البيانات محفوظة في الهاتف (localStorage)
        const savedUser = localStorage.getItem('xtream_user');
        const savedPass = localStorage.getItem('xtream_pass');
        const savedDomain = localStorage.getItem('xtream_domain');

        if (savedUser && savedPass && savedDomain) {
            currentUser = savedUser;
            currentPass = savedPass;
            currentDomain = savedDomain;
            showMainScreen();
        }
    };

    function saveCredentialsAndLogin() {
        const domain = document.getElementById('xtream-domain').value;
        const user = document.getElementById('xtream-user').value;
        const pass = document.getElementById('xtream-pass').value;

        if (!domain || !user || !pass) {
            alert("يرجى تعبئة جميع الحقول!");
            return;
        }

        // حفظ البيانات في ذاكرة المتصفح (ستبقى محفوظة داخل تطبيق الآيفون)
        localStorage.setItem('xtream_domain', domain);
        localStorage.setItem('xtream_user', user);
        localStorage.setItem('xtream_pass', pass);

        currentUser = user;
        currentPass = pass;
        currentDomain = domain;
        showMainScreen();
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    function showMainScreen() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        fetchMovies("15"); // جلب تصنيف الأفلام كمثال
    }

    // ==========================================
    // 3. جلب مكتبة Xtream ودمجها مع بيانات Supabase
    // ==========================================
    async function fetchMovies(categoryId) {
        const apiUrl = `${currentDomain}/player_api.php?username=${currentUser}&password=${currentPass}&action=get_vod_streams&category_id=${categoryId}`;
        
        try {
            // جلب الأفلام من سيرفر البث
            const xtreamResponse = await fetch(apiUrl);
            const movies = await xtreamResponse.json();

            // جلب تاريخ المشاهدات للمستخدم الحالي من Supabase
            const { data: userActivity, error } = await supabase
                .from('user_activity')
                .select('*')
                .eq('username', currentUser);

            displayMovies(movies.slice(0, 20), userActivity || []); // عرض أول 20 فيلم للتبسيط
        } catch (error) {
            document.getElementById('movies-container').innerText = "حدث خطأ أثناء الاتصال بالخادم.";
        }
    }

    function displayMovies(movies, userActivity) {
        const container = document.getElementById('movies-container');
        container.innerHTML = '';

        movies.forEach(movie => {
            // البحث إذا كان المستخدم قد شاهد هذا الفيلم من قبل
            const activity = userActivity.find(act => act.movie_id == movie.stream_id);
            const resumeTime = activity ? activity.resume_time : 0;
            const isFav = activity ? activity.is_favorite : false;

            const streamExtension = movie.container_extension || "mkv";
            const videoUrl = `${currentDomain}/movie/${currentUser}/${currentPass}/${movie.stream_id}.${streamExtension}`;

            // شريط التقدم (كشكل توضيحي، بافتراض أن مدة الفيلم 7200 ثانية - ساعتين)
            const progressPercent = resumeTime > 0 ? Math.min((resumeTime / 7200) * 100, 100) : 0;

            const movieEl = document.createElement('div');
            movieEl.className = 'movie-card';
            movieEl.innerHTML = `
                <img src="${movie.stream_icon}" onerror="this.src='default_poster.jpg'">
                <h3 style="font-size: 14px;">${movie.name}</h3>
                
                ${resumeTime > 0 ? `<div class="progress-bar"><div class="progress-fill" style="width: ${progressPercent}%"></div></div><small style="color:#aaa;">تمت المشاهدة جزئياً</small>` : ''}
                
                <button onclick="playMovieInApp('${videoUrl}', ${resumeTime}, '${movie.stream_id}')">
                    ${resumeTime > 0 ? 'إكمال المشاهدة' : 'تشغيل الفيلم'}
                </button>
                <button onclick="toggleFavorite('${movie.stream_id}', ${!isFav})" style="background: ${isFav ? '#f39c12' : '#333'};">
                    ${isFav ? '★ مفضل' : '☆ أضف للمفضلة'}
                </button>
            `;
            container.appendChild(movieEl);
        });
    }

    // ==========================================
    // 4. الجسر للتواصل مع تطبيق الآيفون + المزامنة
    // ==========================================
    function playMovieInApp(videoUrl, resumeTime, movieId) {
        currentMovieId = movieId;
        
        const message = { type: 'PLAY_MOVIE', url: videoUrl, resumeTime: resumeTime };

        if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(JSON.stringify(message));
        } else {
            alert("محاكاة: تشغيل الفيلم من الثانية " + resumeTime);
        }
    }

    // هذه الدالة سيستدعيها تطبيق الآيفون برمجياً كل 5 ثوانٍ
    window.updateWatchProgress = async function(currentSeconds) {
        if (!currentMovieId || !currentUser) return;

        // تحديث أو إدخال الوقت في قاعدة بيانات Supabase
        const { error } = await supabase
            .from('user_activity')
            .upsert({ 
                username: currentUser, 
                movie_id: currentMovieId, 
                resume_time: currentSeconds 
            }, { onConflict: 'username, movie_id' }); // تأكد من إعداد Unique Constraint في Supabase
    };

    // دالة لحفظ/إزالة الفيلم من المفضلة
    async function toggleFavorite(movieId, makeFavorite) {
        const { error } = await supabase
            .from('user_activity')
            .upsert({ 
                username: currentUser, 
                movie_id: movieId, 
                is_favorite: makeFavorite 
            }, { onConflict: 'username, movie_id' });

        if (!error) {
            fetchMovies("15"); // إعادة تحميل القائمة لتحديث شكل الأزرار
        }
    }
</script>
</body>
</html>
