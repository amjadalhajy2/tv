name: Build Unsigned iOS App
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild (Generate iOS code)
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build Unsigned App (Dynamic Name)
        run: |
          cd ios
          # البحث التلقائي عن اسم مساحة العمل والمخطط (Workspace & Scheme)
          WORKSPACE_NAME=$(ls | grep .xcworkspace | head -1)
          SCHEME_NAME=$(basename "$WORKSPACE_NAME" .xcworkspace)
          
          echo "Building Scheme: $SCHEME_NAME"
          
          xcodebuild -workspace "$WORKSPACE_NAME" -scheme "$SCHEME_NAME" -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" -derivedDataPath build

      - name: Create IPA file
        run: |
          mkdir -p Payload
          # نقل التطبيق أياً كان اسمه التلقائي
          mv ios/build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iphone-iptv-IPA
          path: app.ipa
